<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Fretboard</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #262624;
    --bg-light: #2f2f2c;
    --text: #a8a8a0;
    --text-dim: #5a5a54;
    --accent: #e85d3a;
    --scale-note: #6ba3be;
    --fret-wire: #4a4a44;
    --nut: #d4cfc0;
    --string: #b8b0a0;
    --fretboard: #3a3632;
    --marker: #2a2826;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 60px 20px 40px;
    user-select: none;
  }

  /* --- Controls --- */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 52px;
    align-items: center;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .control-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .control-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .control-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .control-btn:hover {
    color: var(--text);
  }

  .control-btn.active {
    color: #fff;
    border-color: var(--text-dim);
  }

  #root-buttons .control-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* --- Fretboard Wrapper --- */
  .fretboard-wrapper {
    overflow-x: auto;
    max-width: 100%;
    padding-bottom: 10px;
  }

  /* --- Fretboard --- */
  .fretboard {
    display: grid;
    grid-template-rows: repeat(6, 36px);
    position: relative;
    background: var(--fretboard);
    border-left: 6px solid var(--nut);
  }

  /* --- String lines --- */
  .fretboard::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .string-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--string);
    pointer-events: none;
    z-index: 2;
  }

  /* --- Cells --- */
  .cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid var(--fret-wire);
    z-index: 3;
  }

  .cell.open-string {
    border-right: none;
    background: var(--bg);
    min-width: 40px;
  }

  /* --- Note circles --- */
  .note {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    background: var(--bg-light);
    color: var(--text-dim);
    transition: opacity 0.15s, transform 0.15s, background 0.15s, color 0.15s;
    opacity: 0.45;
    transform: scale(0.85);
  }

  .note.visible {
    opacity: 1;
    transform: scale(1);
    background: var(--bg-light);
    color: var(--text);
  }

  .note.root {
    background: var(--accent);
    color: #fff;
    opacity: 1;
    transform: scale(1.1);
  }

  .note.in-scale {
    background: var(--scale-note);
    color: #fff;
    opacity: 1;
    transform: scale(1);
  }

  .note.dimmed {
    opacity: 0;
    transform: scale(0.7);
  }

  .note.faded {
    opacity: 0.9;
    transform: scale(0.85);
    background: var(--bg-light);
    color: var(--text-dim);
  }

  .note { cursor: pointer; }
  .note:active { transform: scale(0.95); }

  /* --- Fret markers --- */
  .markers {
    display: grid;
    margin-top: 6px;
  }

  .marker-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 10px;
  }

  .marker-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--marker);
    display: inline-block;
    margin: 0 2px;
  }

  /* --- Fret numbers --- */
  .fret-numbers {
    display: grid;
    margin-top: 2px;
  }

  .fret-num {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* --- Open string labels --- */
  .open-labels {
    position: absolute;
    left: -30px;
    top: 0;
    display: flex;
    flex-direction: column;
  }

  .open-label {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 11px;
    color: var(--text-dim);
    padding-right: 6px;
  }

  /* --- Layout container --- */
  .fretboard-container {
    position: relative;
    padding-left: 32px;
  }

  /* --- Inlay dots on fretboard --- */
  .inlay {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }

  .inlay-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--marker);
    position: absolute;
    transform: translate(-50%, -50%);
  }

  /* --- Toggle button --- */
  .toggle-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: 24px;
  }

  .toggle-btn:hover { color: var(--text); }
  .toggle-btn.active { color: #fff; border-color: var(--text-dim); }

  /* --- Fretboard + volume layout row --- */
  .fretboard-area {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  /* --- Volume slider (left of fretboard, vertical) --- */
  .volume {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-right: 0;
    flex-shrink: 0;
  }

  .volume input[type="range"] {
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 2px;
    height: 170px;
    background: var(--fret-wire);
    outline: none;
    cursor: pointer;
  }

  .volume input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    border: none;
    cursor: pointer;
  }

  .volume input[type="range"]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    border: none;
    cursor: pointer;
  }

  .volume-emoji {
    font-size: 14px;
    line-height: 1;
    margin-top: 8px;
  }

  /* --- Mode Toggle (Simple/Advanced) --- */
  .mode-toggle {
    display: flex;
    background: var(--bg-light);
    border-radius: 20px;
    padding: 3px;
    margin-bottom: 28px;
    gap: 2px;
  }

  .mode-toggle button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 20px;
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .mode-toggle button.active {
    background: var(--fret-wire);
    color: #fff;
  }

  /* --- Scale button coloring (Advanced) --- */
  .control-btn.major-scale {
    color: #4a90d9;
    border-color: #4a90d9;
  }

  .control-btn.minor-scale {
    color: #9b59b6;
    border-color: #9b59b6;
  }

  .control-btn.major-scale.active {
    color: #fff;
    background: #4a90d9;
    border-color: #4a90d9;
  }

  .control-btn.minor-scale.active {
    color: #fff;
    background: #9b59b6;
    border-color: #9b59b6;
  }

  /* --- Scale legend --- */
  .scale-legend {
    display: none;
    gap: 16px;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .scale-legend.visible { display: flex; }

  .scale-legend span::before {
    content: '●';
    margin-right: 4px;
  }

  .scale-legend .major-legend::before { color: #4a90d9; }
  .scale-legend .minor-legend::before { color: #9b59b6; }

  /* --- Fretboard note coloring (Advanced) --- */
  .note.in-scale-major {
    background: #4a90d9;
    color: #fff;
    opacity: 1;
    transform: scale(1);
  }

  .note.in-scale-minor {
    background: #9b59b6;
    color: #fff;
    opacity: 1;
    transform: scale(1);
  }

  /* --- Chord note coloring --- */
  .note.chord-note {
    background: #27ae60;
    color: #fff;
    opacity: 1;
    transform: scale(1.05);
  }

  .note.chord-root {
    background: var(--accent);
    color: #fff;
    opacity: 1;
    transform: scale(1.1);
  }

  /* --- Fret toggle --- */
  .fret-toggle {
    display: none;
    align-items: center;
    gap: 2px;
  }

  .fret-toggle.visible { display: flex; }

  .fret-toggle button {
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .fret-toggle button:hover { color: var(--text); }

  .fret-toggle button.active {
    color: #fff;
    border-color: var(--text-dim);
  }

  /* --- Chord Section --- */
  .chord-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 28px;
    padding-top: 28px;
    border-top: 1px solid var(--fret-wire);
    width: 100%;
    max-width: 700px;
  }

  .chord-section.visible {
    display: flex;
  }

  /* --- Category toggle (Chords/Triads/Arpeggios) --- */
  .category-toggle {
    display: flex;
    background: var(--bg-light);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }

  .category-toggle button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .category-toggle button.active {
    background: var(--fret-wire);
    color: #fff;
  }

  .chord-sub-section { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
  .chord-sub-section.visible { display: flex; }

  .chord-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .chord-row.fingering-row .control-row {
    flex-direction: column;
    gap: 2px;
  }

  .chord-row .control-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .chord-row .control-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .control-btn.chord-active {
    color: #27ae60;
    border-color: #27ae60;
  }

  .note.muted-string {
    opacity: 1;
    transform: scale(0.85);
    background: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
  }

  /* --- Advanced sub-block --- */
  .advanced-sub-block {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    padding: 20px 24px;
    border: 1px solid var(--fret-wire);
    width: 100%;
    max-width: 700px;
  }

  .advanced-sub-block.visible { display: flex; }

  .sub-block-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* --- Circle of Fifths --- */
  .cof-container {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .cof-container.visible { display: flex; }

  .cof-svg {
    width: 368px;
    height: 368px;
  }

  .cof-label {
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 18px;
    fill: var(--text-dim);
    text-anchor: middle;
    dominant-baseline: central;
    cursor: pointer;
    transition: fill 0.15s;
  }

  .cof-label:hover { fill: var(--text); }
  .cof-label.active { fill: #fff; }
  .cof-label.root-active { fill: var(--accent); }

  .cof-label-minor {
    font-size: 17.5px;
    fill: var(--text-dim);
    opacity: 0.6;
  }

  .cof-label-minor:hover { opacity: 1; fill: var(--text); }
  .cof-label-minor.active { opacity: 1; fill: #fff; }
  .cof-label-minor.root-active { opacity: 1; fill: var(--accent); }

  .cof-ring {
    fill: none;
    stroke: var(--fret-wire);
    stroke-width: 1;
  }

  .cof-line {
    stroke: var(--fret-wire);
    stroke-width: 0.5;
    opacity: 0.4;
  }

  /* --- Responsive --- */
  @media (max-width: 800px) {
    body { padding: 30px 10px 20px; }
    .controls { margin-bottom: 32px; gap: 20px; }
    .fretboard-container { padding-left: 28px; }
  }
</style>
</head>
<body>

<div class="mode-toggle" id="mode-toggle">
  <button class="active" data-mode="simple">Simple</button>
  <button data-mode="advanced">Advanced</button>
</div>

<div class="controls">
  <div class="control-group">
    <div class="control-label">Root Note</div>
    <div class="control-row" id="root-buttons"></div>
  </div>
  <div class="control-group">
    <div class="control-label">Scale / Mode</div>
    <div class="control-row" id="scale-buttons"></div>
    <div class="scale-legend" id="scale-legend">
      <span class="major-legend">Major</span>
      <span class="minor-legend">Minor</span>
    </div>
  </div>
  <div class="control-group">
    <div class="control-label" id="fret-toggle-label" style="display:none">Frets</div>
    <div class="fret-toggle" id="fret-toggle">
      <button class="active" data-frets="12">12</button>
      <button data-frets="24">24</button>
    </div>
  </div>
</div>

<div class="fretboard-area">
  <div class="volume">
    <input type="range" id="volume" min="0" max="100" value="25">
    <span class="volume-emoji">🔊</span>
  </div>
  <div>
    <div class="fretboard-wrapper">
      <div class="fretboard-container">
        <div id="open-labels" class="open-labels"></div>
        <div id="fretboard" class="fretboard"></div>
        <div id="fret-numbers" class="fret-numbers"></div>
      </div>
    </div>
  </div>
</div>

<button class="toggle-btn" id="show-keys-btn">Show All Notes</button>
<button class="toggle-btn" id="show-intervals-btn">Show Intervals</button>

<div class="chord-section" id="chord-section">
  <!-- Circle of Fifths -->
  <div class="cof-container visible" id="cof-container">
    <div class="sub-block-label">Circle of Fifths</div>
    <svg class="cof-svg" id="cof-svg" viewBox="0 0 368 368"></svg>
  </div>

  <!-- Chords / Triads / Arpeggios sub-block -->
  <div class="advanced-sub-block visible" id="chord-sub-block">
    <div class="sub-block-label">Chords / Triads / Arpeggios</div>
    <div class="category-toggle" id="category-toggle">
      <button class="active" data-cat="chords">Chords</button>
      <button data-cat="triads">Triads</button>
      <button data-cat="arpeggios">Arpeggios</button>
    </div>
    <div class="chord-row">
      <div class="control-label">Root</div>
      <div class="control-row" id="chord-root-buttons"></div>
    </div>

    <!-- Chords sub-section -->
    <div class="chord-sub-section visible" id="sub-chords">
      <div class="chord-row">
        <div class="control-label">Type</div>
        <div class="control-row" id="chord-type-buttons"></div>
      </div>
      <div class="chord-row">
        <div class="control-label">Voicing</div>
        <div class="control-row" id="chord-voicing-buttons"></div>
      </div>
      <div class="chord-row fingering-row">
        <div class="control-label">Fingering</div>
        <div class="control-row" id="chord-fingering-buttons"></div>
      </div>
    </div>

    <!-- Triads sub-section -->
    <div class="chord-sub-section" id="sub-triads">
      <div class="chord-row">
        <div class="control-label">Quality</div>
        <div class="control-row" id="triad-quality-buttons"></div>
      </div>
      <div class="chord-row">
        <div class="control-label">Strings</div>
        <div class="control-row" id="triad-strings-buttons"></div>
      </div>
      <div class="chord-row">
        <div class="control-label">Inversion</div>
        <div class="control-row" id="triad-inversion-buttons"></div>
      </div>
    </div>

    <!-- Arpeggios sub-section -->
    <div class="chord-sub-section" id="sub-arpeggios">
      <div class="chord-row">
        <div class="control-label">Type</div>
        <div class="control-row" id="arp-type-buttons"></div>
      </div>
      <div class="chord-row">
        <div class="control-label">Pattern</div>
        <div class="control-row" id="arp-pattern-buttons"></div>
      </div>
    </div>
  </div>
</div>

<script src="chords.js"></script>
<script src="triads.js"></script>
<script src="arpeggios.js"></script>
<script>
  // --- Audio: Sample-based playback with pitch shifting ---
  let audioCtx = null;
  const sampleBuffers = {}; // key -> AudioBuffer

    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function loadSamples() {
    if (samplesLoading) return samplesLoading;
    const ctx = getAudioCtx();
    samplesLoading = Promise.all(SAMPLE_MAP.map(async (entry, i) => {
      try {
        const resp = await fetch(entry.data);
        const buf = await resp.arrayBuffer();
        sampleBuffers[i] = await ctx.decodeAudioData(buf);
      } catch (e) {
        console.error('Sample load failed:', i, e);
      }
    }));
    return samplesLoading;
  }

  function getFrequency(stringIdx, fret) {
    return OPEN_FREQS[stringIdx] * Math.pow(2, fret / 12);
  }

  function findNearestSample(targetFreq) {
    let bestIdx = 0;
    let bestDist = Math.abs(Math.log2(targetFreq / SAMPLE_MAP[0].freq));
    for (let i = 1; i < SAMPLE_MAP.length; i++) {
      const dist = Math.abs(Math.log2(targetFreq / SAMPLE_MAP[i].freq));
      if (dist < bestDist) { bestIdx = i; bestDist = dist; }
    }
    return bestIdx;
  }

  async function playNote(stringIdx, fret) {
    const ctx = getAudioCtx();
    await loadSamples();

    const targetFreq = getFrequency(stringIdx, fret);
    const idx = findNearestSample(targetFreq);
    const buffer = sampleBuffers[idx];
    if (!buffer) return;

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.playbackRate.value = targetFreq / SAMPLE_MAP[idx].freq;

    const gain = ctx.createGain();
    const vol = document.getElementById('volume').value / 100;
    gain.gain.setValueAtTime(vol, ctx.currentTime);

    source.connect(gain);
    gain.connect(ctx.destination);
    source.start();
  }

  // --- Music theory ---
  const CHROMATIC = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
  const TUNING = ['E','B','G','D','A','E']; // high to low (top to bottom visually)
  const STRING_THICKNESS = [0.5, 0.8, 1.2, 1.6, 2, 2.5]; // px, high E to low E

  const SCALES = {
    'Ionian':     [0,2,4,5,7,9,11],
    'Dorian':     [0,2,3,5,7,9,10],
    'Phrygian':   [0,1,3,5,7,8,10],
    'Lydian':     [0,2,4,6,7,9,11],
    'Mixolydian': [0,2,4,5,7,9,10],
    'Aeolian':    [0,2,3,5,7,8,10],
    'Locrian':    [0,1,3,5,6,8,10],
  };

  const DEFAULT_FRET_COUNT = 12;
  const MARKER_FRETS_24 = [3, 5, 7, 9, 12, 15, 17, 19, 21, 24];
  const DOUBLE_MARKER_24 = [12, 24];

  // --- Scale type classification ---
  const SCALE_TYPE = {
    'Ionian': 'major', 'Lydian': 'major', 'Mixolydian': 'major',
    'Dorian': 'minor', 'Phrygian': 'minor', 'Aeolian': 'minor', 'Locrian': 'minor',
  };

  // CHORD_DB loaded from chords.js

  // TRIAD_INTERVALS, INVERSION_ORDER loaded from triads.js

  // Compute triad fret positions for given root, quality, string set, and inversion.
  // Returns array of {sIdx, fret, isRoot} or null if no playable voicing found.
  function findTriadPositions(root, quality, stringSetKey, inversion) {
    const intervals = TRIAD_INTERVALS[quality];
    const order = INVERSION_ORDER[inversion];
    const stringIndices = STRING_SETS[stringSetKey];
    if (!intervals || !order || !stringIndices) return null;

    const rootNoteIdx = noteIndex(root);

    // For each string, find all candidate frets for the target note
    const candidates = [];
    for (let i = 0; i < 3; i++) {
      const sIdx = stringIndices[i];
      const targetNoteIdx = (rootNoteIdx + intervals[order[i]]) % 12;
      const openIdx = noteIndex(TUNING[sIdx]);
      const baseFret = (targetNoteIdx - openIdx + 12) % 12;
      const options = [];
      for (let f = baseFret; f <= fretCount; f += 12) {
        options.push(f);
      }
      candidates.push({ sIdx, options, isRoot: order[i] === 0 });
    }

    // Try all combinations, pick the one with smallest fret span, prefer lower position
    let bestCombo = null;
    let bestSpan = Infinity;
    let bestMin = Infinity;
    for (const f0 of candidates[0].options) {
      for (const f1 of candidates[1].options) {
        for (const f2 of candidates[2].options) {
          const frets = [f0, f1, f2];
          const maxF = Math.max(...frets);
          const minF = Math.min(...frets);
          const span = maxF - minF;
          if (span < bestSpan || (span === bestSpan && minF < bestMin)) {
            bestSpan = span;
            bestMin = minF;
            bestCombo = frets;
          }
        }
      }
    }

    if (!bestCombo) return null;
    return candidates.map((c, i) => ({ sIdx: c.sIdx, fret: bestCombo[i], isRoot: c.isRoot }));
  }

  // STRING_SETS loaded from triads.js
  // ARPEGGIO_TYPES loaded from arpeggios.js

  // --- State ---
  let selectedRoot = null;
  let selectedScale = null;
  let showAllNotes = false;
  let showIntervals = false;
  let advancedMode = false;
  let fretCount = 12;
  let selectedCategory = 'chords'; // 'chords' | 'triads' | 'arpeggios'
  let selectedChordRoot = null;
  let selectedChordType = 'Major';
  let selectedVoicing = null;
  let selectedFingering = null;
  // Triads
  let selectedTriadQuality = 'Major';
  let selectedTriadStrings = '4-3-2';
  let selectedTriadInversion = 'Root';
  // Arpeggios
  let selectedArpType = null;

  const INTERVAL_NAMES = ['R','b2','2','b3','3','4','b5','5','b6','6','b7','7'];

  // --- Helpers ---
  function noteIndex(name) {
    return CHROMATIC.indexOf(name);
  }

  function noteAtFret(openString, fret) {
    const idx = (noteIndex(openString) + fret) % 12;
    return CHROMATIC[idx];
  }

  // Compute actual fret positions for a chord fingering at a given offset.
  // Tries shifting down 12 frets when it produces a valid, lower voicing.
  // Returns array of actual frets (null preserved), or null if not playable.
  function resolveChordFrets(fingering, offset) {
    const high = fingering.map(f => f !== null ? f + offset : null);
    const low = high.map(f => f !== null ? f - 12 : null);
    const highValid = high.every(f => f === null || (f >= 0 && f <= fretCount));
    const lowValid = low.every(f => f === null || (f >= 0 && f <= fretCount));
    if (!highValid && !lowValid) return null;
    if (!lowValid) return high;
    if (!highValid) return low;
    // Both valid — pick the one with lower max fret
    const maxH = Math.max(...high.filter(f => f !== null));
    const maxL = Math.max(...low.filter(f => f !== null));
    return maxL < maxH ? low : high;
  }

  // Pick the fingering that results in the lowest fret position for the current root.
  function pickBestFingering(fingerings) {
    if (!selectedChordRoot) return fingerings[0];
    const offset = (noteIndex(selectedChordRoot) - noteIndex('C') + 12) % 12;
    let best = null;
    let bestMax = Infinity;
    for (const fg of fingerings) {
      const resolved = resolveChordFrets(fg, offset);
      if (!resolved) continue;
      const maxFret = Math.max(...resolved.filter(f => f !== null));
      if (maxFret < bestMax) {
        bestMax = maxFret;
        best = fg;
      }
    }
    return best || fingerings[0];
  }

  function getScaleNotes(root, scaleName) {
    const rootIdx = noteIndex(root);
    const intervals = SCALES[scaleName];
    return intervals.map(i => CHROMATIC[(rootIdx + i) % 12]);
  }

  function getIntervalName(root, noteName) {
    const semitones = (noteIndex(noteName) - noteIndex(root) + 12) % 12;
    return INTERVAL_NAMES[semitones];
  }

  // --- Fret widths (real guitar proportions) ---
  function fretWidths(count) {
    count = count || fretCount;
    const widths = [];
    const ratio = Math.pow(2, 1 / 12);
    let remaining = 1;
    for (let i = 0; i < count; i++) {
      const w = remaining / ratio;
      const fretW = remaining - w;
      widths.push(fretW);
      remaining = w;
    }
    const total = widths.reduce((a, b) => a + b, 0);
    const minPx = count > 12 ? 36 : 46;
    const baseWidth = count > 12 ? 1600 : 900;
    const scaled = widths.map(w => Math.max(minPx, (w / total) * baseWidth));
    return scaled;
  }

  // --- Build UI ---
  function buildControls() {
    const rootContainer = document.getElementById('root-buttons');
    CHROMATIC.forEach(note => {
      const btn = document.createElement('button');
      btn.className = 'control-btn';
      btn.textContent = note;
      btn.addEventListener('click', () => {
        if (selectedRoot === note) {
          selectedRoot = null;
          btn.classList.remove('active');
        } else {
          selectedRoot = note;
          rootContainer.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
        updateFretboard();
      });
      rootContainer.appendChild(btn);
    });

    const scaleContainer = document.getElementById('scale-buttons');
    Object.keys(SCALES).forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'control-btn';
      btn.textContent = name;
      btn.addEventListener('click', () => {
        if (selectedScale === name) {
          selectedScale = null;
          btn.classList.remove('active');
        } else {
          selectedScale = name;
          scaleContainer.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (advancedMode) clearChordSelection();
        }
        updateFretboard();
      });
      scaleContainer.appendChild(btn);
    });
  }

  function buildFretboard() {
    const fb = document.getElementById('fretboard');
    fb.innerHTML = '';
    const widths = fretWidths();
    const markerFrets = MARKER_FRETS_24.filter(f => f <= fretCount);
    const doubleMarkers = DOUBLE_MARKER_24.filter(f => f <= fretCount);

    // Grid template columns: open + N frets
    const cols = ['40px', ...widths.map(w => w + 'px')];
    fb.style.gridTemplateColumns = cols.join(' ');

    // Create cells
    for (let s = 0; s < 6; s++) {
      for (let f = 0; f <= fretCount; f++) {
        const cell = document.createElement('div');
        cell.className = 'cell' + (f === 0 ? ' open-string' : '');

        const noteName = noteAtFret(TUNING[s], f);
        const noteEl = document.createElement('div');
        noteEl.className = 'note visible';
        noteEl.textContent = noteName;
        noteEl.dataset.note = noteName;
        noteEl.dataset.string = s;
        noteEl.dataset.fret = f;

        noteEl.addEventListener('click', () => {
          playNote(s, f);
        });

        cell.appendChild(noteEl);
        fb.appendChild(cell);
      }
    }

    // String lines
    for (let s = 0; s < 6; s++) {
      const line = document.createElement('div');
      line.className = 'string-line';
      line.style.top = (s * 36 + 18) + 'px';
      line.style.height = STRING_THICKNESS[s] + 'px';
      fb.appendChild(line);
    }

    // Inlay dots
    const totalHeight = 6 * 36;
    let xOffset = 40;
    const cumulativeX = [0];
    for (let i = 0; i < widths.length; i++) {
      cumulativeX.push(cumulativeX[i] + widths[i]);
    }

    markerFrets.forEach(fret => {
      const left = xOffset + cumulativeX[fret - 1] + (widths[fret - 1] / 2);
      if (doubleMarkers.includes(fret)) {
        const dot1 = document.createElement('div');
        dot1.className = 'inlay-dot';
        dot1.style.left = left + 'px';
        dot1.style.top = (totalHeight * 0.3) + 'px';
        fb.appendChild(dot1);

        const dot2 = document.createElement('div');
        dot2.className = 'inlay-dot';
        dot2.style.left = left + 'px';
        dot2.style.top = (totalHeight * 0.7) + 'px';
        fb.appendChild(dot2);
      } else {
        const dot = document.createElement('div');
        dot.className = 'inlay-dot';
        dot.style.left = left + 'px';
        dot.style.top = (totalHeight / 2) + 'px';
        fb.appendChild(dot);
      }
    });

    // Open string labels
    const labels = document.getElementById('open-labels');
    labels.innerHTML = '';
    TUNING.forEach(note => {
      const lbl = document.createElement('div');
      lbl.className = 'open-label';
      lbl.textContent = note;
      labels.appendChild(lbl);
    });

    // Fret numbers
    const fretNums = document.getElementById('fret-numbers');
    fretNums.innerHTML = '';
    fretNums.style.gridTemplateColumns = cols.join(' ');
    for (let f = 0; f <= fretCount; f++) {
      const num = document.createElement('div');
      num.className = 'fret-num';
      num.textContent = f === 0 ? '' : f;
      fretNums.appendChild(num);
    }
  }

  // --- Build highlight positions for active category ---
  function buildHighlightPositions() {
    const positions = new Map(); // "stringIdx-fret" -> { isRoot }
    if (!selectedChordRoot) return positions;
    const rootIdx = noteIndex(selectedChordRoot);
    const offset = (rootIdx - noteIndex('C') + 12) % 12;

    if (selectedCategory === 'chords' && selectedFingering) {
      const resolved = resolveChordFrets(selectedFingering, offset);
      if (!resolved) return positions;
      for (let i = 0; i < 6; i++) {
        const stringIdx = 5 - i;
        const actualFret = resolved[i];
        if (actualFret !== null) {
          const noteName = noteAtFret(TUNING[stringIdx], actualFret);
          positions.set(stringIdx + '-' + actualFret, { isRoot: noteName === selectedChordRoot });
        }
      }
    } else if (selectedCategory === 'triads') {
      const triadPos = findTriadPositions(selectedChordRoot, selectedTriadQuality, selectedTriadStrings, selectedTriadInversion);
      if (!triadPos) return positions;
      for (const p of triadPos) {
        positions.set(p.sIdx + '-' + p.fret, { isRoot: p.isRoot });
      }
    } else if (selectedCategory === 'arpeggios' && selectedArpType) {
      const intervals = ARPEGGIO_TYPES[selectedArpType];
      if (!intervals) return positions;
      const arpNotes = intervals.map(i => CHROMATIC[(rootIdx + i) % 12]);
      // Highlight all matching notes across the entire fretboard
      for (let s = 0; s < 6; s++) {
        for (let f = 0; f <= fretCount; f++) {
          const noteName = noteAtFret(TUNING[s], f);
          if (arpNotes.includes(noteName)) {
            positions.set(s + '-' + f, { isRoot: noteName === selectedChordRoot });
          }
        }
      }
    }
    return positions;
  }

  function updateFretboard() {
    const notes = document.querySelectorAll('.note');
    const hasRoot = selectedRoot !== null;
    const hasScale = selectedScale !== null;
    const scaleNotes = (hasRoot && hasScale) ? getScaleNotes(selectedRoot, selectedScale) : [];
    const scaleType = selectedScale ? SCALE_TYPE[selectedScale] : null;

    const highlightPositions = buildHighlightPositions();
    const hasHighlight = highlightPositions.size > 0;
    const highlightRoot = selectedChordRoot;
    const isArpeggio = selectedCategory === 'arpeggios' && hasHighlight;

    notes.forEach(el => {
      const noteName = el.dataset.note;
      const stringIdx = parseInt(el.dataset.string);
      const fret = parseInt(el.dataset.fret);
      const key = stringIdx + '-' + fret;

      el.classList.remove('visible', 'root', 'in-scale', 'in-scale-major', 'in-scale-minor', 'dimmed', 'faded', 'chord-note', 'chord-root', 'muted-string');

      const dim = showAllNotes ? 'faded' : 'dimmed';

      if (hasHighlight) {
        if (highlightPositions.has(key)) {
          const pos = highlightPositions.get(key);
          el.classList.add(pos.isRoot ? 'chord-root' : 'chord-note');
          if (showIntervals) {
            el.textContent = pos.isRoot ? 'R' : getIntervalName(highlightRoot, noteName);
          } else {
            el.textContent = noteName;
          }
        } else {
          if (!isArpeggio && selectedCategory !== 'triads') {
            // Regular chords: keep existing muted-string logic
            const stringHasNote = Array.from(highlightPositions.keys()).some(k => k.startsWith(stringIdx + '-'));
            if (!stringHasNote && fret === 0) {
              el.classList.add('muted-string');
              el.textContent = '×';
            } else {
              el.classList.add('dimmed');
              el.textContent = noteName;
            }
          } else if (scaleNotes.length > 0) {
            // Triads/Arpeggios with scale selected: show scale context
            if (scaleNotes.includes(noteName)) {
              if (advancedMode && scaleType === 'major') {
                el.classList.add('in-scale-major');
              } else if (advancedMode && scaleType === 'minor') {
                el.classList.add('in-scale-minor');
              } else {
                el.classList.add('in-scale');
              }
              el.textContent = showIntervals ? getIntervalName(selectedRoot, noteName) : noteName;
            } else {
              el.classList.add(dim);
              el.textContent = noteName;
            }
          } else {
            // Triads/Arpeggios without scale: just dim
            el.classList.add(dim);
            el.textContent = noteName;
          }
        }
      } else if (!hasRoot) {
        el.classList.add('visible');
        el.textContent = noteName;
      } else if (hasRoot && !hasScale) {
        if (noteName === selectedRoot) {
          el.classList.add('root');
          el.textContent = showIntervals ? 'R' : noteName;
        } else {
          el.classList.add(dim);
          el.textContent = noteName;
        }
      } else {
        if (noteName === selectedRoot) {
          el.classList.add('root');
          el.textContent = showIntervals ? 'R' : noteName;
        } else if (scaleNotes.includes(noteName)) {
          if (advancedMode && scaleType === 'major') {
            el.classList.add('in-scale-major');
          } else if (advancedMode && scaleType === 'minor') {
            el.classList.add('in-scale-minor');
          } else {
            el.classList.add('in-scale');
          }
          el.textContent = showIntervals ? getIntervalName(selectedRoot, noteName) : noteName;
        } else {
          el.classList.add(dim);
          el.textContent = noteName;
        }
      }
    });
    updateCircleOfFifths();
  }

  // --- Category switching ---
  function setCategory(cat) {
    selectedCategory = cat;
    document.querySelectorAll('#category-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    document.getElementById('sub-chords').classList.toggle('visible', cat === 'chords');
    document.getElementById('sub-triads').classList.toggle('visible', cat === 'triads');
    document.getElementById('sub-arpeggios').classList.toggle('visible', cat === 'arpeggios');
    // Reset selections when switching
    selectedFingering = null;
    selectedVoicing = null;
    selectedArpType = null;
    buildChordSection();
    updateFretboard();
  }

  // --- Chord section logic ---
  function buildChordSection() {
    // Root buttons (shared by all categories)
    const rootContainer = document.getElementById('chord-root-buttons');
    rootContainer.innerHTML = '';
    CHROMATIC.forEach(note => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedChordRoot === note ? ' chord-active' : '');
      btn.textContent = note;
      btn.addEventListener('click', () => {
        if (selectedChordRoot === note) {
          selectedChordRoot = null;
        } else {
          selectedChordRoot = note;
        }
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      rootContainer.appendChild(btn);
    });

    buildChordSubSection();
    buildTriadSubSection();
    buildArpeggioSubSection();
  }

  function buildChordSubSection() {
    const typeContainer = document.getElementById('chord-type-buttons');
    typeContainer.innerHTML = '';
    ['Major', 'Minor'].forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedChordType === type ? ' chord-active' : '');
      btn.textContent = type;
      btn.addEventListener('click', () => {
        selectedChordType = type;
        selectedVoicing = null;
        selectedFingering = null;
        buildChordSection();
        updateFretboard();
      });
      typeContainer.appendChild(btn);
    });

    const voicingContainer = document.getElementById('chord-voicing-buttons');
    voicingContainer.innerHTML = '';
    const voicings = Object.keys(CHORD_DB[selectedChordType] || {});
    const rootLabel = selectedChordRoot || '?';
    voicings.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedVoicing === v ? ' chord-active' : '');
      const displayName = selectedChordType === 'Minor' && v === 'min' ? 'min'
        : selectedChordType === 'Major' && v === 'maj' ? 'maj' : v;
      btn.textContent = rootLabel + displayName;
      btn.addEventListener('click', () => {
        if (selectedVoicing === v) {
          selectedVoicing = null;
          selectedFingering = null;
        } else {
          selectedVoicing = v;
          const fingerings = CHORD_DB[selectedChordType][v];
          selectedFingering = fingerings ? pickBestFingering(fingerings) : null;
        }
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      voicingContainer.appendChild(btn);
    });

    const fingeringContainer = document.getElementById('chord-fingering-buttons');
    fingeringContainer.innerHTML = '';
    if (selectedVoicing && CHORD_DB[selectedChordType] && CHORD_DB[selectedChordType][selectedVoicing]) {
      const fingerings = CHORD_DB[selectedChordType][selectedVoicing];
      const offset = selectedChordRoot ? (noteIndex(selectedChordRoot) - noteIndex('C') + 12) % 12 : 0;
      fingerings.forEach((fg, idx) => {
        const btn = document.createElement('button');
        btn.className = 'control-btn' + (selectedFingering === fg ? ' chord-active' : '');
        const resolved = resolveChordFrets(fg, offset);
        const frets = resolved ? resolved.filter(f => f !== null && f > 0) : [];
        const label = frets.length
          ? 'pos ' + (idx + 1) + ' · fret ' + Math.min(...frets) + '–' + Math.max(...frets)
          : 'pos ' + (idx + 1) + ' · open';
        btn.textContent = label;
        btn.addEventListener('click', () => {
          if (selectedFingering === fg) {
            selectedFingering = null;
          } else {
            selectedFingering = fg;
          }
          clearScaleSelection();
          buildChordSection();
          updateFretboard();
        });
        fingeringContainer.appendChild(btn);
      });
    }
  }

  function buildTriadSubSection() {
    const qualityContainer = document.getElementById('triad-quality-buttons');
    qualityContainer.innerHTML = '';
    Object.keys(TRIAD_INTERVALS).forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedTriadQuality === q ? ' chord-active' : '');
      btn.textContent = q;
      btn.addEventListener('click', () => {
        selectedTriadQuality = q;
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      qualityContainer.appendChild(btn);
    });

    const stringsContainer = document.getElementById('triad-strings-buttons');
    stringsContainer.innerHTML = '';
    const stringLabels = { '6-5-4': '6, 5, 4', '5-4-3': '5, 4, 3', '4-3-2': '4, 3, 2', '3-2-1': '3, 2, 1' };
    Object.keys(STRING_SETS).forEach(ss => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedTriadStrings === ss ? ' chord-active' : '');
      btn.textContent = stringLabels[ss];
      btn.addEventListener('click', () => {
        selectedTriadStrings = ss;
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      stringsContainer.appendChild(btn);
    });

    const invContainer = document.getElementById('triad-inversion-buttons');
    invContainer.innerHTML = '';
    ['Root', '1st', '2nd'].forEach(inv => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedTriadInversion === inv ? ' chord-active' : '');
      btn.textContent = inv;
      btn.addEventListener('click', () => {
        selectedTriadInversion = inv;
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      invContainer.appendChild(btn);
    });
  }

  function buildArpeggioSubSection() {
    const typeContainer = document.getElementById('arp-type-buttons');
    typeContainer.innerHTML = '';
    Object.keys(ARPEGGIO_TYPES).forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'control-btn' + (selectedArpType === t ? ' chord-active' : '');
      btn.textContent = t;
      btn.addEventListener('click', () => {
        if (selectedArpType === t) {
          selectedArpType = null;
        } else {
          selectedArpType = t;
        }
        clearScaleSelection();
        buildChordSection();
        updateFretboard();
      });
      typeContainer.appendChild(btn);
    });

    // Pattern buttons (not used for now — arpeggios show all positions)
    const patternContainer = document.getElementById('arp-pattern-buttons');
    patternContainer.innerHTML = '';
    if (selectedArpType && selectedChordRoot) {
      const intervals = ARPEGGIO_TYPES[selectedArpType];
      const rootIdx = noteIndex(selectedChordRoot);
      const arpNotes = intervals.map(i => CHROMATIC[(rootIdx + i) % 12]);
      const label = document.createElement('span');
      label.style.cssText = 'color: var(--text-dim); font-size: 11px; letter-spacing: 1px;';
      label.textContent = arpNotes.join(' – ');
      patternContainer.appendChild(label);
    }
  }

  function clearScaleSelection() {
    selectedScale = null;
    document.querySelectorAll('#scale-buttons .control-btn').forEach(b => b.classList.remove('active'));
  }

  function clearChordSelection() {
    selectedChordRoot = null;
    selectedVoicing = null;
    selectedFingering = null;
    selectedArpType = null;
    buildChordSection();
  }

  // --- Mode toggle ---
  function setAdvancedMode(enabled) {
    advancedMode = enabled;
    document.querySelectorAll('#mode-toggle button').forEach(b => {
      b.classList.toggle('active', (b.dataset.mode === 'advanced') === enabled);
    });

    // Show/hide advanced elements
    document.getElementById('scale-legend').classList.toggle('visible', enabled);
    document.getElementById('fret-toggle').classList.toggle('visible', enabled);
    document.getElementById('fret-toggle-label').style.display = enabled ? '' : 'none';
    document.getElementById('chord-section').classList.toggle('visible', enabled);

    // Apply/remove scale button colors
    applyScaleButtonColors();

    if (!enabled) {
      // Reset advanced-only state
      if (fretCount !== 12) {
        fretCount = 12;
        document.querySelectorAll('#fret-toggle button').forEach(b => {
          b.classList.toggle('active', b.dataset.frets === '12');
        });
        buildFretboard();
      }
      clearChordSelection();
    }
    updateFretboard();
  }

  function applyScaleButtonColors() {
    document.querySelectorAll('#scale-buttons .control-btn').forEach(btn => {
      btn.classList.remove('major-scale', 'minor-scale');
      if (advancedMode) {
        const scaleName = btn.textContent;
        if (SCALE_TYPE[scaleName] === 'major') btn.classList.add('major-scale');
        else if (SCALE_TYPE[scaleName] === 'minor') btn.classList.add('minor-scale');
      }
    });
  }

  // --- Circle of Fifths ---
  const COF_NOTES = ['C','G','D','A','E','B','Gb','Db','Ab','Eb','Bb','F'];
  const COF_MINOR = ['A','E','B','Gb','Db','Ab','Eb','Bb','F','C','G','D'];
  function buildCircleOfFifths() {
    const svg = document.getElementById('cof-svg');
    svg.innerHTML = '';
    const cx = 184, cy = 184;
    const rOuter = 161, rInner = 115, rLine = 170;

    // Outer ring
    const outerRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    outerRing.setAttribute('cx', cx);
    outerRing.setAttribute('cy', cy);
    outerRing.setAttribute('r', rOuter);
    outerRing.setAttribute('class', 'cof-ring');
    svg.appendChild(outerRing);

    // Inner ring
    const innerRing = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    innerRing.setAttribute('cx', cx);
    innerRing.setAttribute('cy', cy);
    innerRing.setAttribute('r', rInner);
    innerRing.setAttribute('class', 'cof-ring');
    svg.appendChild(innerRing);

    // Divider lines
    for (let i = 0; i < 12; i++) {
      const angle = (i * 30 - 105) * Math.PI / 180;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cx + Math.cos(angle) * rInner * 0.7);
      line.setAttribute('y1', cy + Math.sin(angle) * rInner * 0.7);
      line.setAttribute('x2', cx + Math.cos(angle) * rLine);
      line.setAttribute('y2', cy + Math.sin(angle) * rLine);
      line.setAttribute('class', 'cof-line');
      svg.appendChild(line);
    }

    // Major labels (outer)
    COF_NOTES.forEach((note, i) => {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const x = cx + Math.cos(angle) * ((rOuter + rInner) / 2);
      const y = cy + Math.sin(angle) * ((rOuter + rInner) / 2);
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', x);
      label.setAttribute('y', y);
      label.setAttribute('class', 'cof-label');
      label.setAttribute('data-note', note);
      label.textContent = note;
      label.addEventListener('click', () => cofSelectNote(note));
      svg.appendChild(label);
    });

    // Minor labels (inner)
    COF_MINOR.forEach((note, i) => {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const minorR = rInner * 0.7;
      const x = cx + Math.cos(angle) * minorR;
      const y = cy + Math.sin(angle) * minorR;
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', x);
      label.setAttribute('y', y);
      label.setAttribute('class', 'cof-label cof-label-minor');
      label.setAttribute('data-note', note);
      label.textContent = note.toLowerCase() + 'm';
      label.addEventListener('click', () => cofSelectNote(note));
      svg.appendChild(label);
    });
  }

  function cofSelectNote(note) {
    // Select root note on the main controls
    const rootBtns = document.querySelectorAll('#root-buttons .control-btn');
    rootBtns.forEach(btn => {
      if (btn.textContent === note) {
        btn.click();
      }
    });
    updateCircleOfFifths();
  }

  function updateCircleOfFifths() {
    const svg = document.getElementById('cof-svg');
    if (!svg) return;
    const labels = svg.querySelectorAll('.cof-label');
    const scaleNotes = (selectedRoot && selectedScale) ? getScaleNotes(selectedRoot, selectedScale) : [];
    labels.forEach(label => {
      const note = label.getAttribute('data-note');
      label.classList.remove('active', 'root-active');
      if (note === selectedRoot) {
        label.classList.add('root-active');
      } else if (scaleNotes.includes(note)) {
        label.classList.add('active');
      }
    });
  }

  // --- Init ---
  buildControls();
  buildFretboard();
  updateFretboard();
  buildChordSection();
  buildCircleOfFifths();

  // Category toggle (Chords / Triads / Arpeggios)
  document.querySelectorAll('#category-toggle button').forEach(btn => {
    btn.addEventListener('click', () => setCategory(btn.dataset.cat));
  });

  // Mode toggle
  document.querySelectorAll('#mode-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      setAdvancedMode(btn.dataset.mode === 'advanced');
    });
  });

  // Fret toggle
  document.querySelectorAll('#fret-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      const count = parseInt(btn.dataset.frets);
      if (count === fretCount) return;
      fretCount = count;
      document.querySelectorAll('#fret-toggle button').forEach(b => {
        b.classList.toggle('active', b === btn);
      });
      buildFretboard();
      updateFretboard();
    });
  });

  // When selecting a scale, clear chord
  const origScaleContainer = document.getElementById('scale-buttons');
  origScaleContainer.addEventListener('click', (e) => {
    if (e.target.classList.contains('control-btn') && advancedMode) {
      clearChordSelection();
      updateFretboard();
    }
  });

  document.getElementById('show-keys-btn').addEventListener('click', function() {
    showAllNotes = !showAllNotes;
    this.classList.toggle('active', showAllNotes);
    updateFretboard();
  });

  document.getElementById('show-intervals-btn').addEventListener('click', function() {
    showIntervals = !showIntervals;
    this.classList.toggle('active', showIntervals);
    updateFretboard();
  });

</script>
</body>
</html>
